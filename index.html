<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <title>점심 메뉴 추천</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header>
      <div class="header-container">
        <a href="index.html"> <img src="img/다운로드.jfif" alt="" /></a>
        <nav>
          <ul>
            <li>
              <a
                href="https://joongbu.ac.kr/diet/index.es?mid=a10406030000&p=C&d=2026-04-07"
                >오늘의 학식</a
              >
            </li>
            <li id="divider">|</li>
            <li>
              <a href="#" onclick="showSection('recommend')">메뉴 추천</a>
            </li>
            <li id="divider">|</li>
            <li>
              <a href="#" onclick="showSection('dutch')">랜덤 정산하기</a>
            </li>
            <li id="divider">|</li>
            <li><a href="team.html">팀소개</a></li>
          </ul>
        </nav>
      </div>
    </header>

    <main>
      <section id="recommend-section" class="content-section">
        <h2>오늘 점심 뭐 먹을까?</h2>
        <p>버튼을 눌러 랜덤 메뉴를 추천받아 보세요!</p>
        <button class="btn-main" onclick="recommendMenu()">메뉴 추천</button>
        <div id="result-card" class="menu-card hidden"></div>
      </section>

      <section id="dutch-section" class="content-section hidden">
        <h2>랜덤 정산하기</h2>
        <p>총 금액과 인원을 입력하고 참여자의 이름을 적어보세요!</p>

        <div class="input-form">
          <div class="input-row">
            <label for="total-price">총 정산 금액 : </label>
            <input type="number" id="total-price" placeholder="예: 50000" /> 원
          </div>
          <div class="input-row">
            <label for="total-people">참여 인원수 : </label>
            <input
              type="number"
              id="total-people"
              placeholder="예: 4"
              oninput="generateNameInputs()"
            />
            명
          </div>

          <div id="name-inputs-container" class="name-container"></div>

          <button class="btn-main" onclick="calculateRandomDutch()">
            정산하기
          </button>
        </div>

        <div id="dutch-result" class="menu-card hidden"></div>
      </section>
    </main>

    <footer>
      <p>© 2026 점심 메뉴 추천 프로젝트</p>
    </footer>
    <script src="main.js"></script>
  </body>
</html>
